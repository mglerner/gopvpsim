# Blade vs Shield Aegislash comparison (Ultra League).
#
# Parallel to comparisons/aegislash-blade-vs-shield.toml but for UL.
# UL canonical Shield charged moves swap GYRO_BALL for FLASH_CANNON per
# get_default_moveset; both loadouts mirror that pairing so the delta
# isolates form-change behavior, not moveset choice.
#
# Output: userdata/website/comparisons/aegislash-blade-vs-shield-ul/
# Schema: scripts/compare_loadouts.py docstring.

slug   = "aegislash-blade-vs-shield-ul"
title  = "Aegislash UL: Shield path vs always-Blade"
league = "ultra"
author = "mglerner"

order = ["Shield", "Blade"]

summary = """
Aegislash UL form-change comparison. Shield-start-then-Blade is the \
realistic path our sim models via src/gopvpsim/formchange.py; "always \
Blade" uses the Aegislash (Blade) species profile (atk 272 / def 97) \
as a hypothetical. UL charged moves are SHADOW_BALL + FLASH_CANNON on \
both loadouts per the PvPoke UL defaults.
"""

[[loadouts]]
label         = "Shield"
species       = "Aegislash (Shield)"
dive_slug     = "aegislash-shield-ultra-league"
fast_move     = "AEGISLASH_CHARGE_PSYCHO_CUT"
charged_moves = ["SHADOW_BALL", "FLASH_CANNON"]
shadow        = false

[[loadouts]]
label         = "Blade"
species       = "Aegislash (Blade)"
dive_slug     = "aegislash-blade-ultra-league"
fast_move     = "PSYCHO_CUT"
charged_moves = ["SHADOW_BALL", "FLASH_CANNON"]
shadow        = false
