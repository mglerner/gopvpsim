# ── Verdict augment (F4, expert-authored 2026-04-18) ──────────────────
# Shape 2 scope (2026-04-19): CD-day verdict only (catch / ETM /
# form priority). Species-level verdict lives in the per-form deep
# dives' [Species.verdict] blocks. Voice target: RyanSwag-adjacent.
# Schema: docs/article_schema.md "Verdict augment".
[verdict]
authorship = "expert"
author = "Drafted by Claude (Opus 4.7), not yet human-reviewed"
editorial = """
Catch on CD day. Lechonk is a common spawn and Mud Slap is free \
during the three-hour window (2-5 PM local, 2026-05-09), so the \
cost is time rather than stardust. If you already run Oinkologne \
this is a clean upgrade; if you don't, the bulky-Steel / Ghost \
counter-pick niche is real enough to justify one bench slot - pick \
Male for the breakpoint-clearing attacker role, Female for the \
bulky-trade anti-meta role, or catch both and slot per matchup. \
Skip Elite-TMing Mud Slap unless you miss the CD window; the \
CD-day path is free and neither form is so meta-critical that \
waiting breaks a season.
"""
outlook = """
Oinkologne's counter-niche value depends on how much Flying / Fire \
pressure the meta carries - if those types recede, the slot \
widens; if they surge, the niche narrows. Worth a revisit after \
the next season rotation.
"""

