[intro]
author = "Drafted by Claude (Opus 4.7), not yet human-reviewed"
body = """
Oinkologne picks up Mud Slap on Community Day (2026-05-09, 2-5 PM \
local). Short version: Mud Slap is a clean upgrade over Tackle \
(+9.7 pp for Male across 8 of 9 shield scenarios, a comparable gain \
for Female), flipping bulky Steel and Ghost matchups Tackle never \
threatened. Neither form becomes a meta staple - aggregate win rate \
stays sub-50% for both - but the counter-pick niche is real and the \
move is free during the window. Species-level analysis lives in the \
per-form deep dives linked below; this article focuses on the \
CD-day decision: catch, Elite TM, and which form to prioritize.
"""

# ── Meta Role (F1, expert-authored 2026-04-18) ────────────────────────
# Shape 2 scope (2026-04-19): reframed as CD-move comparison (what
# Mud Slap adds / doesn't fix / which form to pick). Species-level
# Meta Role lives in the per-form deep dives' [Species.meta_role]
# blocks; this block covers only the CD-move decision surface.
# Schema: docs/article_schema.md "Meta Role section".
[meta_role]
authorship = "expert"
author = "Drafted by Claude (Opus 4.7), not yet human-reviewed"
good_at = """
Mud Slap adds a Ground coverage slot Oinkologne didn't have pre-CD: \
super-effective damage on bulky Steels and Ghost stallers. Both \
forms share the counter-pick pattern, with Empoleon (regular and \
Shadow), Steelix (regular and Shadow), Galarian Stunfisk, Dusclops \
(both forms), Galarian Corsola, and Sableye all flipping from \
hopeless Tackle-era losses into aggregate wins. Per-form matchup \
surfaces are covered in the deep dives linked above.
"""
bad_at = """
Mud Slap's Ground typing is resisted by Flyers, Grass-types, and \
Bug-types, so the CD move doesn't touch Oinkologne's pre-existing \
Flying / Fire / Dragon problem. Altaria actually worsens across the \
board (regular -12 to -25 pp; Shadow flips from an aggregate \
Tackle-era win to a decisive loss, -47 pp Female / -41 pp Male), \
and Galarian Moltres drops by -25 to -33 pp. The CD move is \
additive: it opens a new counter-pick axis but doesn't fix the old \
weaknesses.
"""
team_role = """
The CD-day question is which form to prioritize, not whether to \
play Oinkologne at all. Male aggregate win rate sits around 43% \
(+9.7 pp over Tackle), Female around 47%, both sub-50% - so either \
form is a counter-pick slot rather than a team anchor. Male's \
raw-Attack frame buys breakpoint-dependent wins against Wigglytuff, \
Lickilicky, Dondozo, and regular Stunfisk that Female's softer \
Attack can't reach; Female's extra Defense and Stamina trade \
further into durable matchups. The form-comparison fragment below \
walks through the specific cells that favor each.
"""
