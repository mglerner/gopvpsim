# ── Intro override (F-intro, expert-authored 2026-04-18) ──────────────
# Replaces the default templated intro with a species-specific hook:
# upfront verdict + named matchup flip + pointer to the sim detail
# below. See docs/article_schema.md "Intro augment".
[intro]
body = """
Oinkologne picks up Mud Slap on Community Day (2026-05-09). Short \
version: Mud Slap is a clean upgrade over Tackle (+9.7 pp for Male \
across 8 of 9 shield scenarios), but it doesn't turn Oinkologne \
into a new meta staple - aggregate win rate stays sub-50%. The \
value is counter-pick: Ground coverage flips bulky Steels and \
Ghost stallers (Empoleon, Steelix, Galarian Stunfisk, Dusclops) \
from hopeless matchups into real wins. Catch if your team needs \
that Steel / Ghost niche; full sim breakdown below.
"""

# ── Meta Role (F1, expert-authored 2026-04-18) ────────────────────────
# Design 2 + freeform escape hatch. Decision record:
# docs/jre_ryanswag_comparison.md §6; schema: docs/article_schema.md
# "Meta Role section". Authored from sim data (Matchup Delta table +
# Meta Coverage grid + threshold-tier aggregate win rates); expected
# to be human-edited once before ship.
[meta_role]
authorship = "expert"
good_at = """
Mud Slap turns Oinkologne from a Normal-typed blunt tool into a \
genuine Steel / Ghost counter-pick. Super-effective Ground damage \
flips the bulky Steel-subtyped walls - Empoleon (regular and Shadow), \
Steelix (regular and Shadow), and Galarian Stunfisk - from hopeless \
Tackle-era losses into aggregate wins, with deltas of +40 to +77 \
percentage points depending on form. The same pattern holds against \
Ghost stallers: Dusclops (both forms), Galarian Corsola, and Sableye \
all move into the win column. The types Oinkologne couldn't scratch \
before Mud Slap are now the types Mud Slap specifically punishes.
"""
bad_at = """
Mud Slap's Ground typing creates its own problem set. Flying-types \
resist Ground damage, and Altaria gets noticeably worse across the \
board: regular Altaria slips by -12 to -25 percentage points (still \
a loss, just a clearer one), and Shadow Altaria swings all the way \
from an aggregate Tackle-era win into a decisive loss (-47 pp \
Female, -41 pp Male). Galarian Moltres worsens by -25 to -33 pp. \
Fringe losses against Politoed (Shadow) for Female and Dondozo for \
Female round out the attack-side costs. Anything that resists \
Ground damage sits opposite Mud Slap's counter-picks.
"""
team_role = """
Mud Slap is an unambiguous upgrade over Tackle (+9.7 pp for Male \
across the full simulated meta), but it doesn't make Oinkologne a \
meta staple. Aggregate win rate against the top-50+CS pool still \
sits below 50% for both forms (Female 46.9%, Male 43.1%). The \
upgrade's value is anti-meta: Oinkologne now punishes specific \
parts of the meta - bulky Steels and Ghost stallers - that were \
previously clean losses. Build it as an answer to a \
team-composition problem (Steel-core coverage, Ghost-wall \
pressure), not as the chassis of a team. Female is slightly ahead \
on aggregate thanks to its Defense and Stamina advantages; Male \
edges Female in attacker-weighted matchups where raw Attack clears \
breakpoints, uniquely flipping Wigglytuff, Lickilicky, Dondozo, and \
regular Stunfisk into wins Female can't reach. Either form wants \
teammates that cover the Flyer / Fire / Dragon core it still can't \
touch.
"""
# Escape hatch -- if non-empty, overrides the three structured
# fields above. Left empty for Oinkologne; the three-slot split is
# natural for this species.
body = ""

# ── Verdict augment (F4, expert-authored 2026-04-18) ──────────────────
# Appended after the mechanical Verdict line. Editorial paragraph
# answers "should you invest?"; optional outlook adds a short
# meta-pulse closer (RyanSwag / JRE wrap-up pattern). Voice target:
# RyanSwag-adjacent. Schema: docs/article_schema.md "Verdict augment".
[verdict]
authorship = "expert"
editorial = """
Catch it. Lechonk is a common CD spawn and Mud Slap is free during \
the three-hour window, so the cost is time rather than stardust. If \
you already run Oinkologne this is a clean +9.7 pp upgrade; if you \
don't, add one to your Steel / Ghost counter bench - not a \
core-meta chassis, but a niche nothing else fills at the same level \
right now. Skip Elite-TMing Mud Slap unless you miss the window; \
the CD-day path is free.
"""
outlook = """
The counter-niche's value depends on how much Flying / Fire \
pressure the meta carries - if those types recede, Oinkologne's \
slot widens; if they surge, the niche narrows. Worth a revisit \
after the next season rotation.
"""

