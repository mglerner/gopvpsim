# Sliggoo — Great League thresholds and slayer anchors.
#
# Sources:
#   - Simulator-derived. No known expert IV writeup exists for GL Sliggoo
#     (current meta rank 31), so unlike tinkaton.toml there are no
#     pre-measured stat thresholds to transcribe. Anchors below are
#     Level-3 discover-all probes designed from current-meta matchup
#     logic against the 2026-06-10 opponent pool
#     (opponent_pools/gl_top50_plus_cs.txt, post-June-2026 rebalance).
#
# Matchup logic in brief: Sliggoo is a defense-skewed Dragon whose
# standard set (Water Gun / Body Slam / Ancient Power) carries no
# dragon-type damage, so it plays like a bulky neutral grinder that
# resists Water / Fire / Grass / Electric and fears Dragon, Ice, and
# Fairy chip. The interesting IV questions are therefore def-side:
# which def tiers step down super-effective Dragon Breath / Dragon Tail
# chip and neutral Body Slam / Mud Shot chip in its many close grinds.
# Atk-side fast-move tiers (Water Gun) matter in the tightest neutral
# races. Per-anchor `source` is set to the simulator-derived attribution
# (every entry cites its provenance); there is deliberately no expert
# name anywhere in this file.

[Sliggoo]
sources = "Simulator-derived (no known expert writeup). Anchors designed 2026-06-12 from current-meta matchup logic vs opponent_pools/gl_top50_plus_cs.txt (2026-06-10 pool, post-June-2026 rebalance)."

[Sliggoo.Great.meta]
notes = "Defense-skewed Dragon, GL meta rank 31. No dragon-type damage in the standard Water Gun / Body Slam / Ancient Power set, so type pressure is one-directional: opponents' Dragon/Ice/Fairy chip hits SE while Sliggoo deals neutral. Bulkpoints dominate; Water Gun breakpoints decide the closest neutral races."

# ─────────────────────────────────────────────────────────────────────
# Anchors — bulkpoints (def-side, Level 3 discover-all)
#
# Opponents chosen where Sliggoo's def/hp checks are plausible and the
# matchup is close under current-meta movesets. SE Dragon chip
# (Altaria, Dragonair, Guzzlord) makes each damage step-down worth a
# full extra fast move of effective bulk; the neutral grinds
# (mirror, Lickilicky, Quagsire, Feraligatr, Jellicent) are long enough
# that single fast-move tiers swing the 1-shield lines.
# ─────────────────────────────────────────────────────────────────────

# The mirror: Water Gun + Body Slam both ways, dragon resists water, so
# it is a pure neutral bulk grind — def tiers against the mirror's
# Water Gun / Body Slam decide it.
[Sliggoo.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Sliggoo"
description = "Discover all mirror-Sliggoo bulkpoints. Long neutral Water Gun / Body Slam grind; fast-move damage tiers decide the mirror."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

# Altaria: Dragon Breath hits Sliggoo SE while Sliggoo's whole set is
# neutral back — close matchup where stepping Dragon Breath down one
# damage tier compounds over a very long fight.
[Sliggoo.Great.anchors.altaria_blkp_any]
kind = "bulkpoint"
opponent = "Altaria"
description = "Discover all Altaria bulkpoints. SE Dragon Breath chip vs Sliggoo's neutral return damage; each Dragon Breath step-down compounds over the long grind."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

# Shadow Altaria: the punchier variant shifts every Dragon Breath tier
# upward; kept as a separate anchor per the pool's keep-shadow-pairs
# policy (players prep against each form deliberately).
[Sliggoo.Great.anchors.altaria_shadow_blkp_any]
kind = "bulkpoint"
opponent = "Altaria (Shadow)"
description = "Discover all Shadow Altaria bulkpoints. The shadow atk boost moves every Dragon Breath tier relative to non-shadow; def checks differ between the pair."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

# Dragonair: rebalance returnee. Same SE Dragon Breath problem as
# Altaria from a frailer body — bulkpoints can flip a narrow line.
[Sliggoo.Great.anchors.dragonair_blkp_any]
kind = "bulkpoint"
opponent = "Dragonair"
description = "Discover all Dragonair bulkpoints. SE Dragon Breath chip from a frailer attacker than Altaria; a single fast-move tier can flip the close line."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

# Lickilicky: the canonical neutral bulk grind — Body Slam pressure
