kind = "bulkpoint"
opponent = "Quagsire"
description = "Discover all Quagsire bulkpoints. Neutral Mud Shot chip vs resisted water charge damage; a Mud Shot step-down buys real energy margin in a close race."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

# Feraligatr: Sliggoo resists Hydro Cannon and water fast damage, but
