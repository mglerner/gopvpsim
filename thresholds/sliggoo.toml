opponent = "Lickilicky"
description = "Discover all Lickilicky bulkpoints. Pure neutral Body Slam war with zero type leverage either way; def tiers against Lickilicky's chip decide the longest grind in the pool."
source = "Simulator-derived (2026-06-12 current-meta matchup logic)"

