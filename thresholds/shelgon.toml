# Shelgon — Great League thresholds and slayer anchors.
#
# EXPERT-NUMBER STATUS: no known expert writeup exists for GL Shelgon —
# it entered the GL top-50 in the June 2026 move rebalance (current GL
# meta rank 30; #1 ranked moveset Dragon Breath / Twister / Flamethrower,
# with Dragon Pulse and Crunch also learnable). This file is
# simulator-derived: anchors are designed purely from current-meta
# matchup logic and resolved by Level-3 discovery, not from community
# calibration numbers. No stat numbers are invented.
#
# MATCHUP LOGIC: Shelgon is a pure Dragon tank (base 172/155/163 —
# def-and-hp-heavy for its CP slot). It resists Water, Fire, Grass, and
# Electric, and is weak to Dragon, Ice, and Fairy. The GL pool is thick
# with Dragon Breath users (Altaria, Dragonair, Kingdra, Sliggoo, the
# mirror) and Ice coverage (Feraligatr, Azumarill, Lapras), so the
# matchups that decide Shelgon's meta role are mutual-super-effective
# dragon wars and neutral chip races — exactly the fights where one
# incoming or outgoing fast-move damage tier swings the result. Hence:
# bulkpoint-heavy discovery vs the dragon cohort and the big Normal
# tanks, plus atk-side breakpoints for the closest dragon wars.
# Azumarill and Lapras are deliberately omitted: Fairy double-resists
# Dragon Breath and Lapras' Ice pressure is overwhelming — those are
# walk-away losses, not tier-sensitive checks.
#
# Opponent selection from opponent_pools/gl_top50_plus_cs.txt
# (2026-06-10, post-June-2026 rebalance); Shelgon and Shelgon (Shadow)
# are both in that pool. Shadow-focal anchors live in
# thresholds/shelgon_shadow.toml per the aegislash_blade /
# aegislash_shield and altaria / altaria_shadow per-form precedent.

[Shelgon]
sources = "Simulator-derived (no expert writeup on record): opponent pool gl_top50_plus_cs.txt (2026-06-10, post-June-2026 rebalance) + PvPoke GL rankings (Shelgon meta rank 30, moveset DRAGON_BREATH/TWISTER/FLAMETHROWER) + type-matchup logic."

[Shelgon.Great.meta]
notes = "Pure-Dragon bulk pivot: mutual super-effective Dragon Breath wars (mirror, Altaria, Dragonair, Sliggoo, Guzzlord) and neutral chip races (Lickilicky) dominate its close matchups, so fast-move damage tiers on both sides carry unusual weight. Fairy and Ice matchups are losses by typing, not by tiers, and are not anchored."

