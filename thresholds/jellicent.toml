[Jellicent.Great.anchors.lickilicky_blkp_any]
kind = "bulkpoint"
opponent = "Lickilicky"
description = "Discover all Lickilicky bulkpoints. Neutral Body Slam spam over a long match makes the Body Slam damage tier the textbook def check."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Altaria: neutral Dragon Breath pressure every turn; a DB tier drop is
# high-value in a matchup with few shield plays.
[Jellicent.Great.anchors.altaria_blkp_any]
kind = "bulkpoint"
opponent = "Altaria"
description = "Discover all Altaria bulkpoints. Constant neutral Dragon Breath pressure; a one-point Dragon Breath tier drop is high value across the whole matchup."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Guzzlord: super-effective dark fast damage (Snarl) and Crunch; close
