# Jellicent — Great League thresholds and slayer anchors.
#
# Sources:
#   - No known expert writeup for GL Jellicent — this file ships as
#     simulator-derived. Anchors below are designed purely from
#     current-meta matchup logic (Water/Ghost typing vs the post-June-2026
#     rebalance meta), not from community stat-check testimony.
#   - Meta context: GL overall rank 5 (PvPoke, post-June-2026 rebalance);
#     opponent picks drawn from opponent_pools/gl_top50_plus_cs.txt
#     (generated 2026-06-10).
#
# Typing logic driving the anchor picks: Water/Ghost is weak to Ghost and
# Dark (and Grass/Electric, absent from the close-matchup set), and
# resists Water, Ice, Fire, Fighting, Poison, Bug, and Steel. The close
# matchups therefore split into:
#   - ghost duels, where super-effective fast damage makes single damage
#     tiers decisive in both directions (mirror, Corsola (Galarian),
#     Feraligatr's and Shadow Sableye's Shadow Claw, Annihilape's ghost
#     charges);
#   - dark pressure, where Snarl/Foul Play/Crunch tiers govern how long
#     Jellicent's bulk holds (Umbreon, Guzzlord);
#   - long neutral grinds against bulky water/normal/dragon cores, where
#     fast-move damage tiers accumulate over many cycles (Azumarill,
#     Lickilicky, Altaria).
# All anchors are Level 3 (discover-all): with no expert calibration
# points to reproduce, the right move is to enumerate every breakpoint /
# bulkpoint in the survivor range and let the deep-dive distribution show
# which ones actually flip matchups.

[Jellicent]
sources = "Simulator-derived (no known expert writeup). Current-meta matchup logic vs opponent_pools/gl_top50_plus_cs.txt (2026-06-10); GL overall rank 5, PvPoke post-June-2026 rebalance rankings."

# ─────────────────────────────────────────────────────────────────────
# Anchors — bulkpoints (def-side, Level 3 discover-all)
# ─────────────────────────────────────────────────────────────────────

# The mirror. Hex is super effective both ways, so the mirror is decided
# almost entirely by fast-move damage tiers; a one-point drop in incoming
# Hex compounds over the whole match.
[Jellicent.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Jellicent"
description = "Discover all mirror-Jellicent bulkpoints. Hex is super effective both ways, so the mirror hinges on fast-move damage tiers; dropping the incoming Hex tier compounds every cycle."
source = "Simulator-derived: mirror matchup logic, current meta (2026-06)"

# Feraligatr leads the ghost-duel set: Shadow Claw is super effective on
# Jellicent while Jellicent resists the Water charges, making the long
# fast-move race close and tier-sensitive.
[Jellicent.Great.anchors.feraligatr_blkp_any]
kind = "bulkpoint"
opponent = "Feraligatr"
description = "Discover all Feraligatr bulkpoints. Super-effective Shadow Claw vs resisted Hydro charges makes this a long, close fast-move race — a Shadow Claw tier drop swings it."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Shadow Sableye: super-effective Shadow Claw off a low shadow-boosted
# attack stat — exactly the regime where focal def tiers are in reach.
[Jellicent.Great.anchors.sableye_shadow_blkp_any]
kind = "bulkpoint"
opponent = "Sableye (Shadow)"
description = "Discover all Shadow Sableye bulkpoints. Super-effective Shadow Claw from a low shadow-boosted atk stat puts damage-tier drops within the survivor def range."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Galarian Corsola: the other dedicated ghost duel — its ghost fast
# damage is super effective and the matchup is a slow tier war.
[Jellicent.Great.anchors.corsola_galarian_blkp_any]
kind = "bulkpoint"
opponent = "Corsola (Galarian)"
description = "Discover all G-Corsola bulkpoints. Mutual super-effective ghost damage in a slow matchup; incoming fast-move tier drops decide the war of attrition."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Azumarill: Bubble is resisted and Ice Beam doubly unthreatening, but
# Play Rough is neutral and the matchup is a near-even bulk grind —
# classic territory for a fast-move or charge tier to flip the 1-1.
[Jellicent.Great.anchors.azumarill_blkp_any]
kind = "bulkpoint"
opponent = "Azumarill"
description = "Discover all Azumarill bulkpoints. Resisted Bubble plus neutral Play Rough in a near-even bulk grind; small incoming-damage tier drops can flip close shield scenarios."
source = "Simulator-derived: type-matchup logic vs gl_top50_plus_cs pool (2026-06-10)"

# Lickilicky: neutral Body Slam spam is the whole threat profile — the
