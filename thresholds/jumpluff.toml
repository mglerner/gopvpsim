# Jumpluff — Great League thresholds and slayer anchors.
#
# SIMULATOR-DERIVED FILE: no known expert IV writeup exists for GL
# Jumpluff (checked 2026-06-12). All anchors below are Level-3
# discover-all anchors designed from current-meta matchup logic — type
# math against the live opponent pool plus current PvPoke default
# movesets — not from published expert calibration numbers. The deep
# dive discovers the actual (move, tier) ladders; nothing here encodes
# a pre-computed stat target.
#
# Sources:
#   - Opponent pool: opponent_pools/gl_top50_plus_cs.txt (generated
#     2026-06-10, post-June-2026 move rebalance). All anchor opponents
#     use exact spellings from that pool.
#   - PvPoke GL rankings (cached gamemaster/rankings, post-rebalance):
#     Jumpluff is GL meta rank 32, default moveset Fairy Wind /
#     Energy Ball / Acrobatics. Opponent movesets cited in anchor
#     descriptions are the same rankings' current defaults (notably:
#     Lickilicky now leads with ROLLOUT; Medicham runs PSYCHO_CUT, not
#     Counter; Quagsire's default set is Mud Shot / Aqua Tail / Mud
#     Bomb — fully resisted, so that matchup is no longer close and
#     gets no anchor).
#   - Reciprocal expert context (Altaria side only): RyanSwag's Altaria
#     deep dive (GamePress 2022-10-27, encoded in thresholds/altaria.toml)
#     used Jumpluff as a calibration point both ways (102.85 atk flips
#     Altaria's Jumpluff 1-1/0-1; 149.61 def opens its Jumpluff 0-0
#     band). That establishes the Altaria matchup as tier-sensitive
#     from this side too, but gives no Jumpluff-side numbers.
#
# Typing cheat-sheet used for opponent selection (Grass/Flying focal):
# resists Water/Grass/Fighting/Ground(2x); weak to Ice(2x), Fire,
# Flying, Rock, Poison. Fairy Wind chips super-effectively into the
# pool's Dragons, Darks, and Fighters; Energy Ball punishes Waters.
# The close matchups are therefore the resisted-fast-move-plus-Ice-nuke
# Waters (Azumarill, Feraligatr), the SE-chip top of the pool
# (Lickilicky's Rollout, Altaria's flying war), and the neutral chip
# races Fairy Wind tilts (shadow dragons/darks, Medicham, the mirror).
#
# The SHADOW form is also in the 2026-06-10 pool (kept per the
# keep-shadow-pairs policy) and is a separate dive focal; per the
# altaria.toml / altaria_shadow.toml precedent its focal-side anchors
# would live in thresholds/jumpluff_shadow.toml. This file covers the
# base form only; Jumpluff (Shadow) appears below as an opponent.

[Jumpluff]
sources = "Simulator-derived (no expert IV writeup known as of 2026-06-12). Opponent pool gl_top50_plus_cs.txt (2026-06-10, post-June-2026 rebalance); PvPoke GL rankings via cached gamemaster (rank 32; Fairy Wind / Energy Ball / Acrobatics); reciprocal matchup context from RyanSwag's Altaria deep dive (thresholds/altaria.toml)"

[Jumpluff.Great.meta]
notes = "GL meta rank 32 (2026-06, post-rebalance). Ships simulator-derived: Level-3 anchors only, no expert spreads — the dive output is the calibration, not a check against published numbers. Fairy Wind chip + Energy Ball/Acrobatics closers; the IV question is whether def steps blunt the pool's SE chip (Rollout, Sky Attack, shadow Dragon Breath) and Ice nukes, and whether atk steps speed the Fairy Wind races it wants to win."

