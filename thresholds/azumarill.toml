description = "RyanSwag's baseline bulk rule: 135.78 def + 192 hp (the def value is the min for the rank-1 Walrein EQ check). Below either stat, ballpark a 1:2 def:hp tradeoff to stay functionally equivalent — e.g. 134.78 def + 194 hp."
source = "RyanSwag GamePress Azumarill PvP IV Deep-Dive (2022-05-13); SwagTips 'Min' tier"

