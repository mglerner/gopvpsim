# Azumarill — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - RyanSwag, "Azumarill PvP IV Deep-Dive", GamePress, last updated
#     2022-05-13 (SwagTips era). Fetched 2026-06-12 from the Wayback
#     Machine snapshot 20220514104954 of
#     https://gamepress.gg/pokemongo/azumarill-pvp-iv-deep-dive
#     Headline: no critical atk/def breakpoints; maintain >= 135.78 def
#     and ~192 hp with a 1:2 def:hp tradeoff ratio; slight atk weight
#     (>= 92.15 atk) is a worthy tie-breaker (Talonflame/Cofagrigus BPs,
#     mirror CMP). Validated against KiengIV (2022 Indianapolis Champion)
#     and ThoTechtical.
#   - SwagTips-era SENTIMENTAL_DEFAULT_THRESHOLDS block in gobattlekit
#     (src/gobattlekit/data/thresholds.py) — the four GL tiers preserved
#     there (Medi Wall / Min / General / Slight Atk) match the article.
#   - Opponent pool: opponent_pools/gl_top50_plus_cs.txt (2026-06-10,
#     post-June-2026 rebalance). Azumarill is GL meta rank 13.
#
# FRESHNESS CAVEAT: the RyanSwag dive is from May 2022 — pre the
# 2022-09 season move shakeups and four years of meta churn. Several of
# its calibration opponents (Cofagrigus, Skarmory, Trevenant, Walrein,
# Drifblim, Nidoqueen) are out of the current GL top-50 pool. The stat
# thresholds themselves are stable physics (def/atk tiers vs a fixed
# opponent spread); whether each matchup still matters is what the
# Level-3 discovery anchors against the current pool re-establish.

[Azumarill]
sources = "RyanSwag GamePress 'Azumarill PvP IV Deep-Dive' (2022-05-13; Wayback 20220514104954) + SwagTips-era SENTIMENTAL_DEFAULT_THRESHOLDS (gobattlekit) + gl_top50_plus_cs opponent pool (2026-06-10)"

