# ─────────────────────────────────────────────────────────────────────

# The mirror. Peck + Drill Run are mutually neutral, so mirror outcomes
# hinge on fast-move damage tiers and CMP — discover which def tiers
# shave Peck (or Waterfall/Poison Jab variants) by 1.
[Seaking.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Seaking"
description = "Discover all mirror-Seaking bulkpoints in the survivor def range. Neutral Peck/Drill Run mirror — fast-move damage tiers decide it."
source = "Simulator-derived; PvPoke GL rankings 2026-06-10"

