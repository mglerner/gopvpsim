# Corviknight — Great League thresholds, spreads, and slayer anchors.
#
# Current GL meta rank 21 (PvPoke, post-June-2026 rebalance). Steel/Flying:
# resists Fighting, Fairy, Normal, Grass; the def/hp checks below target the
# bulky neutral-damage core (ghost-, water-, dark-, and rock-pressure mons)
# where one damage tier plausibly swings a close 1v1.
#
# Sources:
#   - HomeSliceHenry's Discord #iv-tech stat checks for GL Corviknight, as
#     shipped in GoBattleKit DEFAULT_THRESHOLDS (gobattlekit
#     src/gobattlekit/data/thresholds.py): Basic 127.59 def; Atk 111.47 atk
#     + 127.59 def; Bulk 100 atk / 132.10 def / 149 hp. The underlying
#     Discord writeup is not web-fetchable (2026-06-12 attempt); the exact
#     (opponent, move, tier) calibrations behind each number were not
#     recorded, so they are encoded as Level-2 anchors with Level-3
#     discovery alongside (annihilape.toml lurgan-floor precedent).
#   - SwagTips-era per-opponent checks preserved in GoBattleKit
#     SENTIMENTAL_DEFAULT_THRESHOLDS (same file): Anni 134.61 def,
#     G-Cors 130.34 def, Azu 108.75 atk, Dig 110 atk, among others.
#     Opponents no longer in the current pool (Carbink 130.7 def,
#     Cresselia 134.55 def, Mandibuzz 132.17 def, Drapion 111.4 atk,
#     Toxapex 112.54 atk, "S-ASlash" 124 atk) are noted here for the
#     record but not encoded as anchors.

[Corviknight]
sources = "HomeSliceHenry's Discord #iv-tech (via GoBattleKit DEFAULT_THRESHOLDS); SwagTips-era checks (via GoBattleKit SENTIMENTAL_DEFAULT_THRESHOLDS)"

# ─────────────────────────────────────────────────────────────────────
# Spreads — stat-cutoff tiers from the HomeSliceHenry writeup
# ─────────────────────────────────────────────────────────────────────

[Corviknight.Great.spreads."HSH Basic"]
attack = 0
defense = 127.59
stamina = 0
description = "Baseline tier: 127.59 def floor; the entry-level def check from the HomeSliceHenry writeup."
source = "HomeSliceHenry's Discord (via GoBattleKit DEFAULT_THRESHOLDS)"

[Corviknight.Great.spreads."HSH Atk"]
attack = 111.47
defense = 127.59
stamina = 0
description = "Attack-weighted tier: 111.47 atk on top of the 127.59 def floor; trades rank-1 bulk for breakpoint/CMP pressure."
source = "HomeSliceHenry's Discord (via GoBattleKit DEFAULT_THRESHOLDS)"

[Corviknight.Great.spreads."HSH Bulk"]
attack = 100
defense = 132.10
stamina = 149
description = "Premium bulk tier: 100.00 atk minimum with 132.10 def + 149 hp."
source = "HomeSliceHenry's Discord (via GoBattleKit DEFAULT_THRESHOLDS)"

# ─────────────────────────────────────────────────────────────────────
# Anchors — bulkpoints (def-side), expert Level-2 floors
#
# The HomeSliceHenry def floors arrived without their (opponent, move,
# tier) calibrations. Following the annihilape.toml lurgan-floor
# precedent, each is encoded as a Level-2 anchor against the mirror,
# with the Level-3 discover-all anchors below used to identify which
# opponent/move tier each floor actually preserves — promote to
# Level 1 once identified.
# ─────────────────────────────────────────────────────────────────────

[Corviknight.Great.anchors.mirror_blkp_above_hsh_basic]
kind = "bulkpoint"
opponent = "Corviknight"
above_def = 127.59
description = "Smallest def > 127.59 def (the HomeSliceHenry Basic floor) at which a mirror threat move's damage steps down. Exact original (opponent, move, tier) calibration undocumented — see Level-3 anchors to identify it."
source = "HomeSliceHenry's Discord (via GoBattleKit DEFAULT_THRESHOLDS)"

[Corviknight.Great.anchors.mirror_blkp_above_hsh_bulk]
kind = "bulkpoint"
opponent = "Corviknight"
above_def = 132.10
description = "Smallest def > 132.10 def (the HomeSliceHenry Bulk-tier floor, paired with + 149 hp in the writeup) at which a mirror threat move's damage steps down. Exact original calibration undocumented."
source = "HomeSliceHenry's Discord (via GoBattleKit DEFAULT_THRESHOLDS)"

[Corviknight.Great.anchors.annihilape_blkp_above_swag]
kind = "bulkpoint"
opponent = "Annihilape"
above_def = 134.61
description = "Smallest def > 134.61 def at which an Annihilape threat move's damage steps down. Reproduces the SwagTips-era 'Anni (135D)' check; Corviknight resists Counter, so the tier is presumably on Rage Fist or Shadow Ball."
source = "SwagTips era (via GoBattleKit SENTIMENTAL_DEFAULT_THRESHOLDS)"

[Corviknight.Great.anchors.corsola_galarian_blkp_above_swag]
kind = "bulkpoint"
opponent = "Corsola (Galarian)"
above_def = 130.34
description = "Smallest def > 130.34 def at which a G-Corsola threat move's damage steps down. Reproduces the SwagTips-era 'G-Cors (130D)' check (Astonish/Night Shade pressure is neutral on Corviknight)."
source = "SwagTips era (via GoBattleKit SENTIMENTAL_DEFAULT_THRESHOLDS)"

