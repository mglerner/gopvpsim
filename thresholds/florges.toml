# The mirror (required; Florges is off-pool post-rebalance, auto-injected).
[Florges.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Florges"
description = "Discover all mirror-Florges bulkpoints in the survivor def range. Fairy Wind is resisted in the mirror, so single damage-tier steps on the fast move dominate the CMP-adjacent mirror."
source = "Authoring pass 2026-06-12; mirror anchor per threshold-file convention"

# Azumarill — the other GL fairy; neutral Bubble/Ice Beam chip both ways
