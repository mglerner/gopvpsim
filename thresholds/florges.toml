# Stat-cutoff tier the video names "SWak": minimum attack for the SWak
# check, reference IV 9/6/14. Encoded exactly as shipped in the app.
[Florges.Great.spreads.swak]
description = "Inadequance's SWak attack tier: 121.50 atk minimum (reference IV 9/6/14). Which (opponent, move, tier) the 121.50 atk calibrates to is not recorded locally — recover it via the Level 3 breakpoint anchors below before promoting to a Level 1/2 anchor."
source = "Inadequance YouTube video (KXLWLcOw3G4); shipped as 'SWak 9/6/14' in GoBattleKit DEFAULT_THRESHOLDS"
attack = 121.5
defense = 0
stamina = 0

# Inadequance's explicit GL IV picks from the same video.
[Florges.Great.spreads.inadequance_picks]
