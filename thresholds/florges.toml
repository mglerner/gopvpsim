# Florges — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - Inadequance, "A Deep Dive into Chilling Water Florges!" (YouTube,
#     https://www.youtube.com/watch?v=KXLWLcOw3G4). Title/channel verified
#     via oEmbed 2026-06-12; the numeric claims below are the ones already
#     transcribed into GoBattleKit DEFAULT_THRESHOLDS
#     (src/gobattlekit/data/thresholds.py) from that video. The video body
#     itself is not machine-fetchable, so no numbers beyond the shipped
#     transcription are encoded — do not extend without re-watching.
#   - Opponent selection: opponent_pools/gl_top50_plus_cs.txt (2026-06-10
#     pool). Florges itself dropped out of the top-50 in the June 2026
#     rebalance, so the mirror anchor names a non-pool opponent (same
#     auto-injection mechanism as tinkaton.toml's off-pool anchors).
#
# Great League only. Florges is mono-Fairy: it farms Fighting / Dark /
# Dragon, folds to Steel and Poison, and lives or dies on bulk checks in
# the neutral Water/Normal/Ghost middle of the meta — hence the def-side
# Level-3 anchors below.

[Florges]
sources = "Inadequance 'A Deep Dive into Chilling Water Florges!' YouTube video (KXLWLcOw3G4), numbers as shipped in GoBattleKit DEFAULT_THRESHOLDS; opponent selection from opponent_pools/gl_top50_plus_cs.txt (2026-06-10)"

