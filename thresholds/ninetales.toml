description = "Discover all Malamar bulkpoints. JRE47 shields-down win; surviving Superpower at a lower tier flips the endgame."
source = "JRE47 CD Ninetales article (pokemongohub.net, 2026-02-01)"

# Furret: JRE47 shields-down win. Sucker Punch chip + Trailblaze; a
