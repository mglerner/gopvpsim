# Furret — Great League thresholds and slayer anchors.
#
# Status: SIMULATOR-DERIVED. No known expert writeup exists for GL Furret.
# It entered the meta in the post-June-2026 move rebalance (one of the
# "in" species in the 2026-06-10 gl_top50_plus_cs pool regeneration) and
# currently sits at PvPoke GL overall rank 38. All anchors below are
# Level 3 discover-all by design: with a freshly rebalanced moveset and
# no community calibration points, we let the deep dive enumerate every
# (move, tier) threshold and promote the matchup-flipping ones to
# Level 1 anchors with provenance later.
#
# Typing/moveset logic used to pick opponents (Furret is pure Normal,
# running Sucker Punch chip with Trailblaze + Fighting coverage + Swift):
#   - Pure Normal: weak only to Fighting, immune to Ghost. Most of the
#     pool hits Furret neutrally, so its close fights are long fast-move
#     grinds where single damage tiers compound — prime bulkpoint
#     territory (Lickilicky, Greedent, Diggersby, Umbreon, the mirror).
#   - Trailblaze (Grass) makes the bulky Water/Ground core (Azumarill,
#     Quagsire, Lapras, Dewgong) close rather than lost — surviving one
#     more fast-move tier from them while farming to Trailblaze is the
#     plausible flip in those lines.
#   - Wigglytuff's Charm hits in huge discrete chunks; shaving one Charm
#     tier is worth more effective HP than any other single check here.
# Opponent spellings are exact PvPoke speciesNames from
# opponent_pools/gl_top50_plus_cs.txt (2026-06-10).

[Furret]
sources = "Simulator-derived (no expert writeup). Anchor set designed 2026-06-12 from current-meta type-matchup logic against opponent_pools/gl_top50_plus_cs.txt (2026-06-10 pool, post-June-2026 rebalance); Furret PvPoke GL overall rank 38."

