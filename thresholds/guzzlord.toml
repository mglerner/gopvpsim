# Guzzlord — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - RyanSwag "Guzzlord PvP IV Deep-Dive" (series #21), GamePress,
#     Last Updated 2022-11-14. Fetched via Wayback snapshot
#     20221115114954 of gamepress.gg/pokemongo/guzzlord-pvp-iv-deep-dive
#     (the pogo.gamepress.gg slug from the series INDEX has no Wayback
#     capture; the older gamepress.gg/pokemongo/ slug does).
#   - Current GL meta context: Guzzlord is rank 16 in the post-June-2026
#     rebalance pool (opponent_pools/gl_top50_plus_cs.txt, 2026-06-10).
#
# FRESHNESS CAVEAT: the RyanSwag numbers are from the 2022 meta
# (pre-2026 move rebalances; Froslass / Skuntank / Shadow Drapion /
# Shadow Nidoqueen / Trevenant / Swampert have since left the GL core).
# The atk/def stat thresholds themselves are stable physics against the
# named opponent stats, but whether each matchup still matters should be
# re-verified by the Level-3 discovery anchors below against the current
# gamemaster.
#
# Guzzlord is an Ultra Beast: no shadow form, single form, so one file.
# Stats 188 atk / 99 def / 440 hp — extreme HP, dismal def, which is why
# the def-side checks dominate the expert writeup. Great League only;
# the article's Ultra League tiers (84/85.45 def, 144.36 atk, 339 hp)
# are deliberately not encoded here.

[Guzzlord]
