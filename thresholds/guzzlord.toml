# The headline matchup of the writeup.
[Guzzlord.Great.anchors.altaria_blkp_any]
kind = "bulkpoint"
opponent = "Altaria"
description = "Discover all Altaria bulkpoints. RyanSwag: 63.74 def (vs rank-7 Altaria) opens the 1-1; the 2-2 needs 63.74 def + 267 hp (bulk route) or the atk breakpoint; 64.38 def covers the range up to max-def / Trevenant-Slayer-atk Altaria variants."
source = "RyanSwag Guzzlord deep dive (GamePress, 2022-11-14)"

# Shadow pair of the headline matchup — punchier Dragon Breath, so the
# def tiers sit higher; discovery anchor, no expert number.
