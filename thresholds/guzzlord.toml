opponent = "Guzzlord"
description = "Discover all mirror-Guzzlord bulkpoints. RyanSwag: the 2-2 mirror flips across roughly 62.00 def to 64.17 def depending on the opposing Guzzlord's stats."
source = "RyanSwag Guzzlord deep dive (GamePress, 2022-11-14)"

