kind = "bulkpoint"
opponent = "Medicham"
description = "Discover all Medicham bulkpoints. Counter hits super-effective; def tiers govern how long Guzzlord's huge HP pool lasts under fighting pressure."

# Sableye: resisted Foul Play both ways; RyanSwag names the 1-2 as a
