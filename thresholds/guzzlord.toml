kind = "bulkpoint"
opponent = "Altaria (Shadow)"
description = "Discover all Shadow Altaria bulkpoints. Shadow counterpart of the calibration matchup; expect the def tiers to sit above the non-shadow ones."

# The mirror (required anchor). Guzzlord resists its own Dark side and
# both sides' Dragon Tail hits super-effective — def tiers decide it.
