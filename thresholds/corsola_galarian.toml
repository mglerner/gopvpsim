# Corsola (Galarian) — Great League thresholds and slayer anchors.
#
# Status: simulator-derived. No known community/expert IV writeup exists
# for GL G-Corsola (current GL meta rank 7, post-June-2026 rebalance
# rankings). All anchors below are designed from current-meta matchup
# logic against the 2026-06-10 gl_top50_plus_cs opponent pool; treat the
# Level-3 discoveries as the primary product of the dive, then promote
# the sub-anchors that actually flip matchups to Level 1.
#
# Profile: pure Ghost, base 116/182/155 — a bulk monster (rank-1 GL
# stats ~99.3 atk / 163 def / 139 hp). Moveset Astonish / Night Shade /
# Power Gem (Rock Blast alt). Ghost typing double-resists Normal and
# Fighting, takes super-effective from Ghost and Dark. Because the atk
# stat is so low and the def stat so high, the interesting IV questions
# are almost entirely def/hp tiers (bulkpoints) plus a handful of
# Astonish-chip breakpoints in the ghost mirrors. PvPoke's editor note
# ("a high rank Galarian Corsola has better neutral matchups than one
# with hatch IVs") is the closest thing to community testimony: rank-1
# stat-product is the community default, so the discoveries below tell
# us which damage tiers that default actually buys.
#
# Cross-reference: thresholds/tinkaton.toml carries the reverse anchor
# (corsola_galarian_blkp_any, "143.04 def + 140 hp flips the 0s"),
# independent confirmation that the Tinkaton matchup swings on stat
# tiers from both sides.

