#
# EXPERT-NUMBER STATUS: RyanSwag's Sableye PvP IV Deep Dive (GamePress
# series #33, last updated 2021-11-26, fetched 2026-06-12 via Wayback
# snapshot 2025-12-12) is about PURIFIED Sableye — Return is the whole
# build, and Return is purified-exclusive, so a shadow can never run his
# moveset and the writeup contains no shadow-specific stat numbers. None
# are encoded here (no numbers are invented). Where a base-form number
# is quoted below it is context, not a shadow target: the shadow
# multipliers (atk x1.2, def x0.8333) mean the base form's atk
# breakpoints largely come free while every def/hp check from the
# writeup's High Def (124.70 def + 123 hp) / Med Def (122.40 def +
# 125 hp) tiers is out of reach at shadow def and must be rediscovered,
# which is why this file is bulkpoint-heavy discovery — same shape as
# altaria_shadow.toml and kingdra_shadow.toml.
#
# Opponent selection from opponent_pools/gl_top50_plus_cs.txt
# (generated 2026-06-10, post-June-2026 rebalance); Sableye (Shadow) is
# in that pool alongside base Sableye (GL meta rank 29). All opponent
# names below use that file's exact PvPoke speciesName spellings.

