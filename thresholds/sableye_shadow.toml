["Sableye (Shadow)".Great.meta]
notes = "Shadow trade-off: x1.2 atk buys the base form's Slight Atk / High Atk bands (e.g. the 121.60 atk Greedent calibration) cheaply and opens tiers the purified form can't reach; x0.8333 def means the writeup's def/hp tiers don't transfer and the 126-hp mirror-tie logic needs rediscovery. No Return: the shadow leans on Foul Play plus the weaker Power Gem / Shadow Sneak coverage, so winning fast-move tiers matters even more. Level-3 anchors below enumerate both sides; promote discovered (move, tier) pairs that split the survivor cohort to Level-1 anchors."

