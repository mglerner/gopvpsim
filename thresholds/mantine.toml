# Mantine — Great League thresholds and slayer anchors.
#
# No known expert writeup exists for GL Mantine (unlike the acidicArisen
# Tinkaton notes) — this file ships simulator-derived. Anchors below are
# designed purely from current-meta matchup logic against the 2026-06-10
# opponent pool (opponent_pools/gl_top50_plus_cs.txt, post-June-2026
# rebalance; Mantine sits at GL meta rank 17).
#
# Typing logic driving the opponent picks: Mantine is Water/Flying —
# it resists Water, Fighting, Bug, Fire, Steel and strongly resists
# Ground, while the current pool carries no Electric attacker and only
# incidental Rock coverage (Quagsire's Stone Edge). Its meta matchups
# are therefore mostly close resisted-pressure fights where a single
# def tier (bulkpoint) or fast-move damage tier (breakpoint) plausibly
# flips a 1-shield or 0-shield line. Moveset assumed: Wing Attack +
# Bubble Beam / Ice Beam (PvPoke default).

[Mantine]
sources = "Simulator-derived (no expert writeup): anchors designed from current-meta matchup logic vs the 2026-06-10 GL top-50 + championshipseries opponent pool"

# ─────────────────────────────────────────────────────────────────────
# Anchors — bulkpoints (def-side, Level 3 discover-all)
#
# Survive-one-more-fast-move / drop-a-damage-tier checks in Mantine's
# close meta fights. Level 3 so the deep dive enumerates every
# (threat move, damage tier) in the survivor def range and reports
# which tiers actually move win/loss lines.
# ─────────────────────────────────────────────────────────────────────

# The mirror. Wing Attack vs Wing Attack is a pure stat-tier war; a
# resisted-Bubble-Beam or Wing Attack damage tier decides who wins the
# extended 1s/0s farm-down.
[Mantine.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Mantine"
description = "Discover all mirror-Mantine bulkpoints. The mirror is a fast-move stat war; a Wing Attack damage tier decides the farm-down."
source = "Simulator-derived (current-meta matchup logic)"

# Pelipper: the near-mirror — same Water/Flying typing, same Wing
