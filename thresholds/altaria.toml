# Jumpluff: in the current pool AND a RyanSwag calibration point. Grass/
# Flying with Fairy Wind pressure; the fast-move chip war is tight both
# ways, so single damage steps decide the 1-1 and 0-1.
[Altaria.Great.anchors.jumpluff_brkp_any]
kind = "damage_breakpoint"
opponent = "Jumpluff"
description = "Discover all Jumpluff damage breakpoints. RyanSwag: 102.85 atk flips Jumpluff 1-1 and 0-1 (band starts at 101.69 atk; 102.85 calibrated vs the rank-21 0/15/8 — 22 unorthodox low-HP IVs may require even more)."
source = "RyanSwag GamePress Altaria deep dive (2022-10-27)"

# Shadow Dragonair: post-rebalance pool entry. Dragon Breath war — both
# sides resist nothing and deal super-effective fast damage, so DB damage
# tiers decide the matchup. No expert calibration yet; pure discovery.
[Altaria.Great.anchors.dragonair_shadow_brkp_any]
kind = "damage_breakpoint"
opponent = "Dragonair (Shadow)"
description = "Discover all Shadow Dragonair damage breakpoints. Mutual super-effective Dragon Breath makes every fast-move damage step swing this close matchup; shadow def drop puts extra tiers in reach."

# Lickilicky: top of the 2026-06-10 pool. Close neutral bulk fight —
# Body Slam chip race where Sky Attack damage steps matter.
[Altaria.Great.anchors.lickilicky_brkp_any]
kind = "damage_breakpoint"
opponent = "Lickilicky"
description = "Discover all Lickilicky damage breakpoints. Close neutral matchup vs the #1 pool entry; a Sky Attack or Dragon Breath damage step is the kind of edge that flips the chip race."

