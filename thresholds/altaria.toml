opponent = "Altaria"
description = "Discover all mirror-Altaria bulkpoints (Dragon Breath / Sky Attack incoming tiers). RyanSwag: + 139 hp ties the 2-2 mirror; only the 0/0/15 wins it."
source = "RyanSwag GamePress Altaria deep dive (2022-10-27)"

