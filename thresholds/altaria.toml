# Altaria — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - RyanSwag "Altaria PvP IV Deep-Dive" (GamePress, last updated
#     2022-10-27). Fetched 2026-06-12 via Wayback Machine snapshot:
#     https://web.archive.org/web/20230321041348/https://gamepress.gg/pokemongo/altaria-pvp-iv-deep-dive
#   - SwagTips-era SENTIMENTAL_DEFAULT_THRESHOLDS in gobattlekit
#     (src/gobattlekit/data/thresholds.py) — its three Altaria GL tiers
#     (Trev / Bulk+Trev / Bulk) match the writeup's named tables exactly.
#   - Current-meta opponent selection from
#     opponent_pools/gl_top50_plus_cs.txt (generated 2026-06-10,
#     post-June-2026 move rebalance; Altaria is GL meta rank 2).
#
# FRESHNESS CAVEAT (same shape as _shared.toml's): the RyanSwag writeup
# is from the 2022 Trevenant/Lanturn era. Trevenant, Lanturn, Cresselia,
# Walrein, Whiscash, and Cofagrigus are NOT in the 2026-06-10 pool. The
# atk/def stat math behind those numbers is stable (it only depends on
# the opponent's stats and the damage formula), so they are preserved as
# historical expert anchors; whether those matchups still matter is a
# meta question, not a math question. The 139-hp mirror logic and the
# Jumpluff / Umbreon checks remain live — both opponents are in the
# current pool.
#
# The SHADOW form is meta-relevant too and lives in its own file,
# thresholds/altaria_shadow.toml (deep_dive.py auto-discovery maps
# "Altaria (Shadow)" -> altaria_shadow.toml, same per-form precedent as
# aegislash_blade.toml / aegislash_shield.toml).

[Altaria]
sources = "RyanSwag's Altaria PvP IV Deep-Dive (GamePress 2022-10-27, via Wayback snapshot 2023-03-21, fetched 2026-06-12); SwagTips-era SENTIMENTAL_DEFAULT_THRESHOLDS (gobattlekit); opponent pool gl_top50_plus_cs.txt (2026-06-10)"

[Altaria.Great.meta]
notes = "GL meta rank 2 (2026-06). RyanSwag's bottom line: bulk is the name of the game, but slight atk weights (Trev Slayer band) had high tournament utility — NHoff Elite-TM'd a Trev-Slaying IV Altaria to 2nd at Peoria 2023. Re-discover which atk/def steps still flip matchups under the 2026 pool via the Level-3 anchors below."

# ─────────────────────────────────────────────────────────────────────
# Spreads — RyanSwag's three named GL tiers (stat-cutoff form, same
# style as tinkaton.toml's "GH Great"/"GH Good")
# ─────────────────────────────────────────────────────────────────────

[Altaria.Great.spreads."Trev Slayer"]
attack = 102.97
defense = 149.02
stamina = 139
description = "RyanSwag's 'Trevenant Slayer' tier: 102.97 atk, 149.02 def + 139 hp. Atk BP for Trevenant 1-2/2-2 plus def bulkpoint for Trevenant 1-1/0-1, both calibrated vs max-def Trevenant, while keeping the 2-2 mirror-tie HP. His general-safety pick; sort by def."
source = "RyanSwag GamePress Altaria deep dive (2022-10-27); mirrored in gobattlekit SENTIMENTAL_DEFAULT_THRESHOLDS 'Trev'"

[Altaria.Great.spreads."Bulk + Trev"]
attack = 101.95
defense = 151.63
stamina = 139
description = "RyanSwag's 'Bulk + Trevenant maybe' tier: 101.95 atk, 151.63 def + 139 hp. For when you don't want to forgo the bulk life and don't expect high-def Trevenant; the def cutoff also covers the Water Gun Lanturn checks. Tie-breakers: + 140 hp generally better, and 153.95 def more useful than + 141 hp."
source = "RyanSwag GamePress Altaria deep dive (2022-10-27); mirrored in gobattlekit SENTIMENTAL_DEFAULT_THRESHOLDS 'Bulk+Trev'"

[Altaria.Great.spreads."Bulk Focus"]
attack = 0
defense = 153.95
stamina = 139
description = "RyanSwag's pure-bulk tier: 153.95 def + 139 hp. 139 hp is the golden ticket that ties the 2-2 mirror (and Walrein 2-1); the 139-141 hp checks (Vigoroth 2-2, Venusaur 1-2, Umbreon 1-1) all likely require this def. His verdict: aside from ranks 1, 2 & 7, probably just go for the atk-weighted builds."
source = "RyanSwag GamePress Altaria deep dive (2022-10-27); mirrored in gobattlekit SENTIMENTAL_DEFAULT_THRESHOLDS 'Bulk'"

