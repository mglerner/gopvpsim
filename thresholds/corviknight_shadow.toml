# (non-shadow) and thresholds/forretress_shadow.toml. Data only -- no
# narrative blocks (see ship-mode policy in CLAUDE.md).

["Corviknight (Shadow)"]
sources = """
Pre-release speculative dive. Shadow Corviknight releases 2026-06-25 and is
NOT yet in PvPoke rankings, so the focal is CONSTRUCTED from the released
non-shadow Corviknight stats with the shadow multipliers applied
(x1.2 atk / x0.8333 def), and the moveset is supplied explicitly
