# Greedent: in the current pool AND a RyanSwag atk calibration point.
[Sableye.Great.anchors.greedent_brkp_any]
kind = "damage_breakpoint"
opponent = "Greedent"
description = "Discover all Greedent damage breakpoints. RyanSwag: 121.60 atk gives Greedent 1-1 potential with straight Foul Play (no Return bait), debuffs permitting — the headline number of his High Atk tier."
source = "RyanSwag GamePress Sableye deep dive (2021-11-26)"

# The mirror: Shadow Claw chip war where single fast-move damage steps
# compound; RyanSwag frames the mirror as HP-decided (126 hp), so the
# atk side is where a tier up can beat the HP ladder.
[Sableye.Great.anchors.mirror_brkp_any]
kind = "damage_breakpoint"
opponent = "Sableye"
description = "Discover all mirror-Sableye damage breakpoints. The mirror is a Shadow Claw chip war RyanSwag calls at 126 hp for the 1-1; an outgoing Shadow Claw tier is the other way to win it."
source = "RyanSwag GamePress Sableye deep dive (2021-11-26); simulator discovery"

# Jellicent: ghost-on-ghost chip race (Hex vs Shadow Claw), and the
# def side already has a RyanSwag number — discovery covers the atk side.
[Sableye.Great.anchors.jellicent_brkp_any]
kind = "damage_breakpoint"
opponent = "Jellicent"
description = "Discover all Jellicent damage breakpoints. Mutual ghost chip race vs a premium-bulk wall; an outgoing Shadow Claw or Foul Play tier shifts the same close matchup RyanSwag calibrated on the def side."
source = "Simulator discovery; opponent pool gl_top50_plus_cs.txt (2026-06-10)"

