# Medicham — Great League thresholds, spreads, and slayer anchors.
#
# Current GL meta rank 27 (PvPoke, post-June-2026 rebalance pool).
# Fighting/Psychic XL spice-core: resists Dark/Fighting/Rock, melts to
# Ghost/Fairy/Flying. Counter pressure + Ice Punch coverage makes most
# of its core matchups CMP-races decided by 1-damage fast-move tiers,
# which is why the def-side bulkpoint ladder below is the heart of this
# file.
#
# Sources:
#   - RyanSwag SwagTips-era Medicham tier thresholds, preserved as
#     SENTIMENTAL_DEFAULT_THRESHOLDS in GoBattleKit
#     (gobattlekit/src/gobattlekit/data/thresholds.py). Numbers encoded
#     verbatim below; the original article's per-tier opponent
#     calibrations were not preserved, so tiers are encoded as
#     stat-cutoff spreads plus mirror-calibrated Level-2 anchors.
#   - RyanSwag "How to do your own PVP IV analysis" methodology video
#     (video-confirmed 2026-04-16, docs/ryanswag_methodology_gap_analysis.md
#     §2): preferred "Best of Both Worlds" Medicham 7/15/14 (106.92 atk)
#     vs rank-1 NBB 5/15/15 (105.88 atk). Cross-referenced with
#     shared.Great.spreads.medicham_atk_weighted in _shared.toml.
#   - Original SwagTips/GamePress Medicham deep dive UNREACHABLE on
#     2026-06-12 (web.archive.org blocked from this environment;
#     gamepress.gg redirect target pokebase.app returns 403). Only the
#     locally recorded numbers above are encoded; nothing is invented.
#   - Bulkpoint/breakpoint opponent selection: GL top-50 + CS pool,
#     opponent_pools/gl_top50_plus_cs.txt (2026-06-10).
#
# FRESHNESS CAVEAT (same as _shared.toml): the SwagTips-era numbers
# predate several move rebalances. The stat thresholds are encoded in
# the parsable "NNN.NN atk / NNN.NN def [+ NNN hp]" format so the
# downstream exporter can verify them for staleness against current
# Level-3 discovery output.

[Medicham]
sources = """
RyanSwag SwagTips-era thresholds (SENTIMENTAL_DEFAULT_THRESHOLDS,
gobattlekit data/thresholds.py) + RyanSwag methodology video
(video-confirmed 2026-04-16; 7/15/14 atk-weighted spread, see
_shared.toml medicham_atk_weighted) + GL top-50+CS opponent pool
(2026-06-10) for matchup selection. Original GamePress deep dive
unreachable 2026-06-12.
"""

