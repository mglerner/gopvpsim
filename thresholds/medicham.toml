kind = "damage_breakpoint"
opponent = "Medicham"
above_atk = 108.0
description = "Smallest atk > 108.00 atk at which any focal move's damage to a default mirror Medicham steps up. Reproduces the SwagTips 'Mirror' tier atk floor; original (move, tier) calibration unknown."
source = "RyanSwag SwagTips-era thresholds (SENTIMENTAL_DEFAULT_THRESHOLDS, gobattlekit)"

