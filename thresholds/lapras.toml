# The mirror (required anchor). Ice is double-resisted both ways, so the
# mirror collapses into a very long neutral fast-move and charged-move
# grind on a 277-HP body — exactly the regime where a single incoming
# damage tier, paid dozens of times, decides the race.
[Lapras.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Lapras"
description = "Discover all mirror-Lapras bulkpoints. Ice double-resisted both ways turns the mirror into a long neutral chip war; one incoming fast-move tier over many turns decides it. Simulator-derived (2026-06-10 pool)."

