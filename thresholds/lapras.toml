# Lapras — Great League thresholds and slayer anchors.
#
# Sources:
#   - NO KNOWN EXPERT WRITEUP. This species ships simulator-derived:
#     every anchor below is a Level-3 discovery anchor designed from
#     current-meta matchup logic, to be resolved against the current
#     gamemaster by the deep-dive pipeline. No community spread or
#     expert stat number is encoded; when the dive surfaces the tiers
#     that matter, promote them to Level-1 anchors with provenance.
#   - Current GL meta context: Lapras is meta rank 39 in the
#     post-June-2026 rebalance pool (opponent_pools/gl_top50_plus_cs.txt,
#     generated 2026-06-10). All opponent spellings below are exact
#     speciesName entries from that pool file.
#
# Typing logic behind the opponent choices (Water/Ice, 165/174/277):
# double-resists Ice, resists Water; weak to Fighting, Rock, Grass,
# Electric; Fire and Steel net out neutral. Lapras's GL identity is a
# bulky chip-war body whose ice damage punishes Dragons and Flyers, so
# the def-side checks concentrate on the close neutral grinds (Normal,
# Dark, Ghost, fellow Water bodies) and the atk-side checks on the
# resisted/neutral races where one damage tier swings a long matchup.
# No shadow Lapras and no alternate form exist, so one file.
# Great League only.

[Lapras]
sources = "Simulator-derived (no expert writeup): Level-3 discovery anchors designed 2026-06-12 from current-meta matchup logic against the GL top-50-plus-CS pool (opponent_pools/gl_top50_plus_cs.txt, 2026-06-10), where Lapras sits at meta rank 39"

