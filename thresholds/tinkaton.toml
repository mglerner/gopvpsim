# Tinkaton — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - acidicArisen #iv-tech writeup on HomeSliceHenry Discord server
#     (datamined Gigaton Hammer 130/60, stat checks for GL Tinkaton)
#   - Legacy JSON thresholds (GH Great / GH Good bulk cutoffs)

[Tinkaton]
sources = "acidicArisen (HSH Discord #iv-tech); legacy JSON thresholds"

# ─────────────────────────────────────────────────────────────────────
# Spreads — stat-cutoff tiers from the acidicArisen summary
# ─────────────────────────────────────────────────────────────────────

[Tinkaton.Great.spreads."GH Great"]
attack = 0
defense = 143.03
stamina = 138
description = "Premium bulk: Azu bulkpoint + Medicham survival + all lower def checks."
source = "HomeSliceHenry's Discord"

[Tinkaton.Great.spreads."GH Good"]
attack = 0
defense = 141.66
stamina = 138
description = "Medicham Dynamic Punch survival (1s no bait) + all lower def checks."
source = "HomeSliceHenry's Discord"

# ─────────────────────────────────────────────────────────────────────
# Anchors — CMP ties (atk-side)
#
# acidicArisen notes CMP thresholds at 105.58 (Corviknight), 105.79
# (Lickilicky, flips 2s no-bait), 105.90 (Medicham, Jellicent). These
# require IV-list spreads to encode as CMP anchors in our schema;
# deferred until CMP anchors support single-opponent shorthand (see
# TODO "Schema simplification"). The BP/blkp anchors below cover the
# matchup-flipping thresholds.
# ─────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────
# Anchors — damage breakpoints (atk-side)
# ─────────────────────────────────────────────────────────────────────

# Level 3: discover all Jellicent BPs. acidicArisen notes 106.20 atk
# beats Jellicent in 1-0 regardless of bait.
[Tinkaton.Great.anchors.jellicent_brkp_any]
kind = "damage_breakpoint"
opponent = "Jellicent"
description = "Discover all Jellicent damage breakpoints. acidicArisen: 106.20 atk flips the 1-0."
source = "HomeSliceHenry's Discord"

# Level 3: discover all Annihilape BPs. acidicArisen notes 106.58 atk
# gives a bulkpoint vs rank 1 Annihilape (but doesn't flip matchups).
[Tinkaton.Great.anchors.annihilape_brkp_any]
kind = "damage_breakpoint"
opponent = "Annihilape"
description = "Discover all Annihilape damage breakpoints. acidicArisen: 106.58 atk gives a BP."
source = "HomeSliceHenry's Discord"

