body = """
Shield-form Aegislash is the canonical Aegislash play pattern: open \
in a 97 / 272 / 155 tank profile, bank energy with zero-power Psycho \
Cut (Aegislash Charge variant - fast move is pure energy generation, \
no damage), then transform to a 272 / 97 / 155 Blade frame on the \
first charged move and finish the rest of the fight as a glass \
cannon. Identity is anti-Fairy and anti-Ghost: Gyro Ball hits Fairies \
(Togekiss, Wigglytuff, Azumarill variants) super-effectively for low \
cost, Shadow Ball punishes the Ghost / Psychic shell at high power. \
The form change is the whole species - it's what lets Aegislash \
survive the early game on Shield bulk and close the late game on \
Blade damage.
"""

