# Sealeo — Great League thresholds and slayer anchors.
#
# Status: SIMULATOR-DERIVED. No known expert writeup exists for GL Sealeo.
# It sits at PvPoke GL overall rank 40 in the post-June-2026 rebalance pool
# (gl_top50_plus_cs.txt, 2026-06-10), alongside its meta-relevant shadow
# form (thresholds/sealeo_shadow.toml — per-form file following the
# aegislash_blade.toml / aegislash_shield.toml precedent). All anchors
# below are Level 3 discover-all by design: with no community calibration
# points, we let the deep dive enumerate every (move, tier) threshold and
# promote the matchup-flipping ones to Level 1 anchors with provenance
# later.
#
# Typing logic used to pick opponents (Sealeo is Water/Ice):
#   - Resists Water (x0.625) and double-resists Ice (x0.39). The pool is
#     saturated with Water types (Azumarill, Lapras, Dewgong, Feraligatr,
#     Jellicent), so Sealeo's bread and butter is long resist-grind wars
#     where a single incoming fast- or charged-move damage tier swings
#     the whole fight — prime bulkpoint territory.
#   - Weak to Fighting, Rock, Electric, and Grass. Of those, the live
#     threat in a close matchup is Galarian Stunfisk's Rock Slide
#     (the fighters mostly hard-counter rather than play close).
#   - Powder Snow hits the pool's dragons super-effectively; Body Slam
#     is the neutral pressure move whose tiers decide the Normal-type
#     chip wars (Lickilicky, Umbreon).
# Opponent spellings are exact PvPoke speciesNames from
# opponent_pools/gl_top50_plus_cs.txt (2026-06-10).

[Sealeo]
sources = "Simulator-derived (no expert writeup). Anchor set designed 2026-06-12 from current-meta type-matchup logic against opponent_pools/gl_top50_plus_cs.txt (2026-06-10 pool, post-June-2026 rebalance); Sealeo PvPoke GL overall rank 40. Shadow form covered in thresholds/sealeo_shadow.toml."

