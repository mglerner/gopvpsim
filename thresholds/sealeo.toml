opponent = "Stunfisk (Galarian)"
description = "Discover all G-Stunfisk bulkpoints. Rock Slide is super-effective into Sealeo's Ice typing and Mud Shot chips neutrally; stepping either down a tier is the def-side route to flipping a classic close fight."
source = "Simulator-derived (matchup logic vs 2026-06-10 GL pool)"

