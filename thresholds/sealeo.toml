# Anchors — bulkpoints (def-side, Level 3 discover-all)
# ─────────────────────────────────────────────────────────────────────

# The mirror. Powder Snow is double-resisted in the mirror (x0.39), so
# the fight is decided by charged-move tiers — exactly what bulkpoint
# discovery enumerates.
[Sealeo.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Sealeo"
description = "Discover every mirror-Sealeo bulkpoint in the survivor def range. Powder Snow is double-resisted both ways, so Body Slam / Aurora Beam tiers decide the mirror; no community spread exists to calibrate against."
source = "Simulator-derived (matchup logic vs 2026-06-10 GL pool)"

# Cross-form: the shadow runs x1.2 atk, so its damage tiers against a
# base-form focal land harder. Both forms are in the 2026-06-10 pool.
[Sealeo.Great.anchors.sealeo_shadow_blkp_any]
kind = "bulkpoint"
opponent = "Sealeo (Shadow)"
description = "Discover every Shadow-Sealeo bulkpoint (cross-form fight). The shadow's boosted Body Slam / Aurora Beam tiers against a base focal decide which form wins the in-family matchup; players run both."
source = "Simulator-derived (matchup logic vs 2026-06-10 GL pool)"

