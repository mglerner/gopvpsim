[Annihilape.Great.spreads.lurgan_ape]
description = """
Community 'Lurgan Ape' spread popularized by lurganrocket. Per Discord
expert testimony (2026-04-08), the spread is defined by two cutoffs:
  attack >= 127.2  (minimum atk for the Lickitung damage breakpoint)
  defense >= 102.9 (def floor; which specific bulkpoint this preserves
                    is not documented — likely a mirror or Lickitung
                    bulkpoint, recoverable via Level 3 bulkpoint discovery
                    once we add the bulkpoint anchor kind)
The 27 IVs below are the enumeration of those cutoffs at GL CP cap. The
spread predates the Counter nerf, Rage Fist addition, and Low Kick buff —
treat as a historical anchor, not a current target. Current expert advice
is to go higher attack than this baseline for CMP wins and BP security
against the mirror and Lickitung.
"""
source = "Community spread (lurganrocket); Discord expert testimony 2026-04-08 (atk 127.2, def 102.9)"
