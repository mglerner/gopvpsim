# Stat-cutoff form of the same Lurgan Ape spread. Per an HSH Discord member
# (Discord, 2026-04-08) the spread is canonically defined by the two
# cutoffs below; the lurgan_ape IV-list above is the enumeration of
# those cutoffs at GL CP cap. Either form can be referenced from anchors;
# use this form when you want a "is this IV a Lurgan Ape?" membership
# check that's robust to game changes (e.g. level cap shifts).
[Annihilape.Great.spreads.lurgan_ape_stat]
description = "Stat-cutoff form of the Lurgan Ape spread (atk >= 127.2, def >= 102.9). Equivalent to the lurgan_ape IV list at GL CP cap, generative form."
source = "Discord expert testimony 2026-04-08"
attack = 127.2
defense = 102.9
stamina = 0

# ─────────────────────────────────────────────────────────────────────
# Anchors — CMP
# ─────────────────────────────────────────────────────────────────────

[Annihilape.Great.anchors.cmp_vs_lurgan]
kind = "cmp"
spread = "lurgan_ape"
description = "Win CMP ties against the community Lurgan Ape spread. Pushing focal atk above max(lurgan) wins the mirror against anyone using a Lurgan IV combo."

# ─────────────────────────────────────────────────────────────────────
# Anchors — damage breakpoints
# ─────────────────────────────────────────────────────────────────────

# Level 2: reproduce the Lurgan-era community Lickitung BP using the actual
# 127.2 minimum atk that an HSH Discord member (2026-04-08) confirmed as the
# Lurgan calibration point. Earlier draft used 127.23 — that was a precision
# error from a screenshot.
[Annihilape.Great.anchors.lickitung_brkp_above_lurgan]
kind = "damage_breakpoint"
opponent = "Lickitung"
above_atk = 127.2
description = "Smallest atk > 127.2 at which any focal move's damage to default Lickitung steps up. Reproduces the historical Lurgan-era 'Lickitung BP' calibration; 127.2 is the confirmed original Lurgan atk minimum."

# Level 3: discover and tag every Lickitung BP in the survivor range.
[Annihilape.Great.anchors.lickitung_brkp_any]
kind = "damage_breakpoint"
opponent = "Lickitung"
description = "Enumerate every Lickitung damage breakpoint in the survivor atk range and tag each survivor with the sub-anchors it clears."

# Level 3: Cresselia — per an HSH Discord member, rumored to have been one of the
# original Lurgan-era calibration points. Discover all BPs so we can see
# which one matters.
[Annihilape.Great.anchors.cresselia_brkp_any]
kind = "damage_breakpoint"
opponent = "Cresselia"
description = "Discover all Cresselia damage breakpoints. Cresselia was a possible original Lurgan calibration point - Level 3 lets us find which BP that was."

# Level 3: Umbreon — ditto.
[Annihilape.Great.anchors.umbreon_brkp_any]
kind = "damage_breakpoint"
opponent = "Umbreon"
description = "Discover all Umbreon damage breakpoints in the survivor atk range."

# Level 3: the mirror itself. Useful to see which BPs matter in the
# Annihilape mirror before the converged cohort is computed.
[Annihilape.Great.anchors.mirror_brkp_any]
kind = "damage_breakpoint"
opponent = "Annihilape"
description = "Discover all damage breakpoints against a default Annihilape. Anchors mirror-match damage analysis."

# ─────────────────────────────────────────────────────────────────────
# Anchors — bulkpoints (def-side mirror of damage breakpoints)
# ─────────────────────────────────────────────────────────────────────

# Level 2: reproduce the Lurgan-era 102.9 def floor that an HSH Discord member
# (2026-04-08) confirmed as the second half of the historical Lurgan calibration.
# The exact (move, tier) bulkpoint that 102.9 preserves was lost — use the
# Level 3 mirror_blkp_any anchor below to discover candidates, then promote
# the matching one to a Level 1 anchor with full provenance.
[Annihilape.Great.anchors.mirror_blkp_above_lurgan]
kind = "bulkpoint"
opponent = "Annihilape"
above_def = 102.9
description = "Smallest def > 102.9 at which any of the mirror's threat moves' damage to the focal steps down. Reproduces the historical Lurgan-era 102.9 def floor; the exact (move, tier) calibration is currently unknown."

# Level 3: enumerate every mirror bulkpoint in the survivor def range. Used to
# identify which (move, tier) the 102.9 floor preserves.
[Annihilape.Great.anchors.mirror_blkp_any]
kind = "bulkpoint"
opponent = "Annihilape"
description = "Discover and tag every mirror-Annihilape bulkpoint in the survivor def range. Goal: identify which (move, tier) the historical 102.9 def floor was originally calibrated to."

# Level 3: same idea against Lickitung. An HSH Discord member noted Lickitung as one of
# the historical calibration targets; the def floor may also map onto a
# Lickitung threat move bulkpoint.
[Annihilape.Great.anchors.lickitung_blkp_any]
kind = "bulkpoint"
opponent = "Lickitung"
description = "Discover and tag every Lickitung bulkpoint in the survivor def range."
