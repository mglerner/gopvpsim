    [15, 12, 0],
]

# ─────────────────────────────────────────────────────────────────────
# Anchors — CMP
# ─────────────────────────────────────────────────────────────────────

[Annihilape.Great.anchors.cmp_vs_lurgan]
kind = "cmp"
spread = "lurgan_ape"
description = "Win CMP ties against the community Lurgan Ape spread. Pushing focal atk above max(lurgan) wins the mirror against anyone using a Lurgan IV combo."

# ─────────────────────────────────────────────────────────────────────
# Anchors — damage breakpoints
# ─────────────────────────────────────────────────────────────────────

# Level 2: reproduce the Lurgan-era community Lickitung BP without needing
# to know exactly which (move, tier) was originally calibrated to 127.23.
[Annihilape.Great.anchors.lickitung_bp_above_lurgan]
kind = "damage_breakpoint"
opponent = "Lickitung"
above_atk = 127.23
description = "Smallest atk > 127.23 at which any focal move's damage to default Lickitung steps up. Reproduces the historical Lurgan-era 'Lickitung BP' calibration."

# Level 3: discover and tag every Lickitung BP in the survivor range.
[Annihilape.Great.anchors.lickitung_bp_any]
kind = "damage_breakpoint"
opponent = "Lickitung"
description = "Enumerate every Lickitung damage breakpoint in the survivor atk range and tag each survivor with the sub-anchors it clears."

# Level 3: Cresselia — per mercuryish, rumored to have been one of the
# original Lurgan-era calibration points. Discover all BPs so we can see
# which one matters.
[Annihilape.Great.anchors.cresselia_bp_any]
kind = "damage_breakpoint"
opponent = "Cresselia"
description = "Discover all Cresselia damage breakpoints. Mercuryish recalled Cresselia as a possible original Lurgan calibration point — Level 3 lets us find which BP that was."

# Level 3: Umbreon — ditto.
[Annihilape.Great.anchors.umbreon_bp_any]
kind = "damage_breakpoint"
opponent = "Umbreon"
description = "Discover all Umbreon damage breakpoints in the survivor atk range."

# Level 3: the mirror itself. Useful to see which BPs matter in the
# Annihilape mirror before the converged cohort is computed.
[Annihilape.Great.anchors.mirror_bp_any]
kind = "damage_breakpoint"
opponent = "Annihilape"
description = "Discover all damage breakpoints against a default Annihilape. Anchors mirror-match damage analysis."
