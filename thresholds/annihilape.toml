# Annihilape — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - Iteration findings (mirror slayer Nash convergence, 2026-04-07). See
#     docs/validations/2026-04-07_annihilape_mirror_slayer_iteration.md
#   - Community "Lurgan Ape" spread popularized by lurganrocket on Twitter.
#   - Expert testimony from an HSH Discord member (2026-04-08) confirming the
#     Lurgan spread predates the Counter nerf, Rage Fist addition, and Low
#     Kick buff, and that current expert advice is to go higher attack than
#     the Lurgan baseline for CMP wins and BP security.

[Annihilape]
sources = "Mirror slayer iteration (2026-04-07) + community Lurgan Ape + Discord expert testimony (2026-04-08)"

# ─────────────────────────────────────────────────────────────────────
# Spreads — stat-cutoff form (preserved from the legacy JSON file so
# tier-coloring scatter plots keep working)
# ─────────────────────────────────────────────────────────────────────

[Annihilape.Great.spreads."High Atk (mirror)"]
attack = 125.0
defense = 103.0
stamina = 0
description = "High-attack mirror cutoff (legacy)."

[Annihilape.Great.spreads.Balanced]
attack = 122.0
defense = 106.0
stamina = 136
description = "Balanced atk/bulk cutoff (legacy)."

[Annihilape.Great.spreads."High Bulk"]
attack = 0
defense = 107.0
stamina = 138
description = "High-bulk cutoff (legacy)."

