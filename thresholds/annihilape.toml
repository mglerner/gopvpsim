# Annihilape — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - Iteration findings (mirror slayer Nash convergence, 2026-04-07). See
#     docs/validations/2026-04-07_annihilape_mirror_slayer_iteration.md
#   - Community "Lurgan Ape" spread popularized by lurganrocket on Twitter.
#   - Expert testimony from mercuryish (Discord, 2026-04-08) confirming the
#     Lurgan spread predates the Counter nerf, Rage Fist addition, and Low
#     Kick buff, and that current expert advice is to go higher attack than
#     the Lurgan baseline for CMP wins and BP security.

[Annihilape]
sources = "Mirror slayer iteration (2026-04-07) + community Lurgan Ape + mercuryish testimony (2026-04-08)"

# ─────────────────────────────────────────────────────────────────────
# Spreads — stat-cutoff form (preserved from the legacy JSON file so
# tier-coloring scatter plots keep working)
# ─────────────────────────────────────────────────────────────────────

[Annihilape.Great.spreads."High Atk (mirror)"]
attack = 125.0
defense = 103.0
stamina = 0
description = "High-attack mirror cutoff (legacy)."

[Annihilape.Great.spreads.Balanced]
attack = 122.0
defense = 106.0
stamina = 136
description = "Balanced atk/bulk cutoff (legacy)."

[Annihilape.Great.spreads."High Bulk"]
attack = 0
defense = 107.0
stamina = 138
description = "High-bulk cutoff (legacy)."

# ─────────────────────────────────────────────────────────────────────
# Spreads — IV-list form
# ─────────────────────────────────────────────────────────────────────

[Annihilape.Great.spreads.lurgan_ape]
description = "Community 'Lurgan Ape' spread popularized by lurganrocket. Calibrated to a Lickitung damage breakpoint near atk 127.23. Predates the Counter nerf, Rage Fist addition, and Low Kick buff — treated as a historical anchor, not a current target. Per mercuryish, current expert advice is to go higher attack than this baseline for CMP wins and BP security against the mirror and Lickitung."
source = "Community spread (lurganrocket); mercuryish testimony 2026-04-08"
ivs = [
    [11, 10, 2],
    [15, 12, 5],
    [11, 11, 0],
    [15, 13, 4],
    [11,  9, 3],
    [11,  9, 2],
    [15, 14, 3],
    [15, 14, 2],
    [11, 10, 1],
    [11, 10, 0],
    [12,  9, 1],
    [12,  9, 0],
    [15, 15, 1],
    [15, 15, 0],
    [15, 12, 4],
    [15, 13, 3],
    [15, 13, 2],
    [11,  9, 1],
    [11,  9, 0],
