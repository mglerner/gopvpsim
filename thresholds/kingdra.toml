# Kingdra — Great League thresholds and slayer anchors.
#
# SIMULATOR-DERIVED: no known expert IV writeup exists for GL Kingdra
# (no RyanSwag GamePress deep dive, no acidicArisen #iv-tech numbers).
# Every anchor below is a Level-3 discover-all designed from current-meta
# matchup logic; no expert stat numbers are encoded because none exist.
#
# Matchup logic in brief: Kingdra is Water/Dragon (GL meta rank 20,
# 2026-06) running Dragon Breath chip. It double-resists Fire and Water,
# resists Steel, and is weak to Dragon and Fairy. That makes its meta
# life a series of mutual-super-effective Dragon Breath wars (Altaria,
# Shadow Dragonair, Shelgon, Guzzlord, the mirror and its shadow) plus
# neutral chip races against the bulky Water/Normal core — exactly the
# matchups where single integer damage tiers in either direction decide
# the fight. Def-side bulkpoints carry most of the value (incoming SE
# Dragon Breath tiers); atk-side breakpoints cover the outgoing side of
# the closest dragon wars.
#
# Opponent selection from opponent_pools/gl_top50_plus_cs.txt
# (generated 2026-06-10, post-June-2026 move rebalance); all opponent
# names below use that file's exact PvPoke speciesName spellings.
#
# The SHADOW form is also GL-meta-relevant (in the same pool) and lives
# in its own file, thresholds/kingdra_shadow.toml — deep_dive.py
# auto-discovery maps "Kingdra (Shadow)" -> kingdra_shadow.toml, same
# per-form precedent as aegislash_blade.toml / aegislash_shield.toml
# and altaria.toml / altaria_shadow.toml.

[Kingdra]
sources = "Simulator-derived (no known expert writeup). Opponent selection: opponent_pools/gl_top50_plus_cs.txt (2026-06-10, post-June-2026 rebalance); Kingdra is GL meta rank 20. Moveset/typing from the cached PvPoke gamemaster."

[Kingdra.Great.meta]
notes = "No expert calibration exists for this species — all anchors are Level-3 discovery. The dragon-war opponents (mutual super-effective Dragon Breath) are where tiers flip matchups in both directions; run the dive and promote whichever discovered (move, tier) pairs actually split the survivor cohort to Level-1 anchors with provenance."

