# Fearow — Great League thresholds and slayer anchors.
#
# Status: SIMULATOR-DERIVED. No known expert writeup exists for GL Fearow.
# It entered the meta in the post-June-2026 move rebalance (one of the
# "in" species in the 2026-06-10 gl_top50_plus_cs pool regeneration) and
# currently sits at PvPoke GL overall rank 22. All anchors below are
# Level 3 discover-all by design: with a freshly rebalanced moveset and
# no community calibration points, we let the deep dive enumerate every
# (move, tier) threshold and promote the matchup-flipping ones to
# Level 1 anchors with provenance later.
#
# Typing logic used to pick opponents (Fearow is Normal/Flying):
#   - Double-resists Grass and Bug; resists Fighting; immune to Ghost
#     and Ground. This makes fighters (Medicham, Annihilape, Primeape)
#     and grassy fliers (Jumpluff) close, def/hp-check-driven matchups.
#   - Weak to Electric, Ice, and Rock — Ice coverage moves (Azumarill's
#     Ice Beam, Medicham's Ice Punch) are the threat moves whose damage
#     tiers most plausibly decide otherwise-close fights.
#   - Neutral flier-vs-flier grinds (Talonflame, Pelipper, the mirror)
#     and Normal-vs-Normal grinds (Lickilicky, Furret) are long fast-move
#     wars where single damage tiers swing the outcome.
# Opponent spellings are exact PvPoke speciesNames from
# opponent_pools/gl_top50_plus_cs.txt (2026-06-10).

[Fearow]
sources = "Simulator-derived (no expert writeup). Anchor set designed 2026-06-12 from current-meta type-matchup logic against opponent_pools/gl_top50_plus_cs.txt (2026-06-10 pool, post-June-2026 rebalance); Fearow PvPoke GL overall rank 22."

