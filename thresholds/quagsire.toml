# Quagsire (and Quagsire (Shadow)) — Great League thresholds, spreads,
# and slayer anchors.
#
# Sources:
#   - RyanSwag "Quagsire PvP IV Deep-Dive" (GamePress series #8, Last
#     Updated 2023-11-04). Fetched 2026-06-12 from the Wayback Machine
#     snapshot 20231104183954 of gamepress.gg/pokemongo/quagsire-pvp-iv-deep-dive
#     (the pogo.gamepress.gg slug listed in
#     docs/reference_deep_dives/ryanswag/INDEX.md only has error-page
#     captures; the older gamepress.gg/pokemongo/ slug has the real 200).
#   - Opponent selection for discovery anchors: current GL meta pool
#     opponent_pools/gl_top50_plus_cs.txt (2026-06-10, post-rebalance).
#
# FRESHNESS CAVEAT (same as _shared.toml): the RyanSwag dive predates the
# June-2026 move rebalance and the current meta pool (it was written for
# the late-2023 Carbink/Sableye/Medicham meta; Carbink, Lanturn, Gligar,
# Froslass, Vigoroth, and Emolga are no longer in our pool). His def/atk
# stat thresholds are opponent-stat arithmetic and remain verifiable as
# written, but whether each cited matchup flip still holds under the
# current gamemaster should be re-checked via the Level-3 discovery
# anchors below.
#
# Both forms live in this one file: the loader (gopvpsim.thresholds
# .load_toml) reads every top-level species table, and PvPoke speciesName
# keys are used exactly ("Quagsire", "Quagsire (Shadow)"). NOTE:
# deep_dive.py's auto-discover path derives thresholds/quagsire_shadow.toml
# for a "Quagsire (Shadow)" focal, so shadow dives should pass
# `--thresholds thresholds/quagsire.toml` explicitly.
#
# CMP note (tinkaton.toml precedent): RyanSwag flags "Cofagrigus CMP
# potential" at 110 atk for the shadow and "Swamp/Venu CMP" Sableye
# builds for the base form. CMP anchors need IV-list spreads for those
# opponents; deferred until CMP anchors support single-opponent
# shorthand. The atk-side BP anchors below carry the numbers.

[Quagsire]
sources = "RyanSwag Quagsire PvP IV Deep-Dive (GamePress, 2023-11-04; Wayback 20231104183954) + GL meta pool gl_top50_plus_cs.txt (2026-06-10)"

# ─────────────────────────────────────────────────────────────────────
# Quagsire (base) — spreads (stat-cutoff tiers named by the writeup)
# ─────────────────────────────────────────────────────────────────────

[Quagsire.Great.spreads."High Bulk"]
attack = 0
defense = 112.0
stamina = 163
description = "RyanSwag 'Non-Shadow, High Bulk' tier: 112.00 def + 163 hp. Enables the Sableye 0-0 & 2-2, fortifies the Carbink 0-1 & 1-2 and Charjabug 1-1, avoids Medicham's Counter breakpoint; 163 hp keeps the Water Gun Lanturn 1-2 (Mud Bomb), Froslass 1-2, and Powder Snow Shadow A-Ninetales 0-1 consistent. Preference ordering within the tier: 113.66 def, then 112.68 def + 164 hp, then raw 164 hp."
source = "RyanSwag Quagsire PvP IV Deep-Dive (GamePress, 2023-11-04)"

