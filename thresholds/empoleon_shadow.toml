# Shadow Empoleon — same base stats, shadow atk/def multipliers.
# JRE47 (2026-01-03) treats it as a GL sidegrade: "Its lower bulk means
# losses to Marowak, Diggersby, Dunsparce, Forretress, Altaria, Murkrow,
# and Feraligatr, but the higher Attack allows it [to] fill those holes
# with new wins over Malamar, Galarian Moltres, Greninja, Sableye,
# Gourgeist, Shadow Steelix, and Blastoise. Same record, different ways
# of getting there." The article gives no shadow-specific stat numbers,
# so anchors below are discover-all (no invented thresholds); opponents
# restricted to the current pool (Marowak, Dunsparce, Murkrow,
# G-Moltres, Greninja, Blastoise are not in gl_top50_plus_cs 2026-06-10).
# ═════════════════════════════════════════════════════════════════════

