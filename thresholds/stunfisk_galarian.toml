# this file is Great League only.
#
# FRESHNESS CAVEAT: the writeup is from the 2022 "G-Fisk dominates GL"
# era. Under the post-June-2026 rebalance rankings G-Fisk sits at GL meta
# rank 33, and several of the article's calibration opponents (Lanturn,
# Noctowl, Cofagrigus, Registeel, Mandibuzz, Trevenant, Lickitung) have
# left the current meta pool. The def/atk numbers are stat-math facts and
# stay encoded for provenance (off-pool expert opponents kept in their own
# section per the tinkaton.toml precedent); whether those matchups still
# matter should be judged against the Level-3 discoveries vs the current
# pool (opponent_pools/gl_top50_plus_cs.txt, 2026-06-10).
#
# Article stat-priority order, for reference:
#   Ranks 1/2/3 > other high bulk (127+ def, 175 hp) >
#   mirror slayers w/ 127.88 def > mirror slayers w/ 127.38 def >
#   101.79 atk / 124.75 def / 172 hp "goldilocks" >
#   at least 124.75 def with at least 172 hp > everything else.
#
# Profile: Ground/Steel, Mud Shot / Rock Slide / Earthquake. Steel-type
# resistance profile plus Rock+Ground charge coverage; the IV story is
# bulk-first (def tiers vs the mirror and fast-move pressure, hp tiers
# for close 2-2/1-2 endgames) with one famous 101.79 atk mirror-slayer
# breakpoint on the atk side.

