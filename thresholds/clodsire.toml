[Clodsire.Great.anchors.jumpluff_blkp_any]
kind = "bulkpoint"
opponent = "Jumpluff"
description = "Discover all Jumpluff bulkpoints. In-pool stand-in for the writeup's Serperior 1-1 bulk check."

