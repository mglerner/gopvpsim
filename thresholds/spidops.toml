# Spidops — Great League thresholds, spreads, and slayer anchors.
#
# Sources:
#   - HomeSliceHenry Discord #iv-tech deep dive (local copy:
#     docs/spidops_deep_dive_reference.md). Atk-side breakpoints, def-side
#     bulk checks, and the recommended stat tiers all come from there.
#   - GoBattleKit DEFAULT_THRESHOLDS (gobattlekit/src/gobattlekit/data/
#     thresholds.py) ships the same three tiers (Atk / Bulk / Bulk+) under
#     the same names — the spreads below mirror those app-shipped keys so
#     the downstream exporter can regex-verify staleness.
#
# Focal moveset context (gamemaster): pure Bug; fast Shadow Claw (also
# learns Bug Bite, Counter); charged Lunge / Rock Tomb (also X-Scissor,
# Grass Knot). The HSH writeup's numbers reference Shadow Claw, Lunge,
# and Rock Tomb damage tiers.

[Spidops]
sources = "HomeSliceHenry Discord deep dive (local copy: docs/spidops_deep_dive_reference.md); GoBattleKit DEFAULT_THRESHOLDS (Atk / Bulk / Bulk+ tiers shipped in-app)"

[Spidops.Great.meta]
notes = """
Spidops sits below top-40 in the current (post-June-2026 rebalance) GL meta
but ships in GoBattleKit today. The HSH writeup itself notes Spidops is less
meta-relevant now than when the dive was written — treat its matchup claims
as calibration provenance, not current meta advice. Florges and Blastoise
have since dropped out of the top-50 pool; their expert anchors are kept via
TOML anchor opponent injection (same convention as tinkaton.toml's Shadow
Drapion / Shadow Politoed).
"""

# ─────────────────────────────────────────────────────────────────────
# Spreads — stat-cutoff tiers from the HSH summary, named to match the
# GoBattleKit DEFAULT_THRESHOLDS keys exactly.
# ─────────────────────────────────────────────────────────────────────

[Spidops.Great.spreads.Atk]
attack = 113.03
defense = 138.88
stamina = 0
description = "Slight attack-weight tier: 113.03 atk + 138.88 def, then as much hp as possible (1/7/1 cited as a strong spread). The atk cutoff is the rank #2 Forretress breakpoint."
source = "HomeSliceHenry Discord deep dive; shipped in GoBattleKit as 'Atk'"

[Spidops.Great.spreads.Bulk]
attack = 109.82
defense = 138.88
stamina = 0
description = "Bulk-focus tier (minimum def): 109.82 atk + 138.88 def, then as much hp as possible. The atk cutoff is the rank #1 Cradily breakpoint; the def cutoff covers default Tinkaton and default Shadow Talonflame."
source = "HomeSliceHenry Discord deep dive; shipped in GoBattleKit as 'Bulk'"

[Spidops.Great.spreads."Bulk+"]
attack = 109.82
defense = 140.67
stamina = 0
description = "Bulk-focus tier (preferred def): 109.82 atk + 140.67 def, then as much hp as possible (2/15/15 cited). The def cutoff adds the rank #1 Altaria no-bait 1s flip."
source = "HomeSliceHenry Discord deep dive; shipped in GoBattleKit as 'Bulk+'"

