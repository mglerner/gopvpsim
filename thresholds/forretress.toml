# flip, with Rock Tomb's -1 atk debuff doubling the value of reaching a
# tier one cycle sooner.
[Forretress.Great.anchors.guzzlord_brkp_any]
kind = "damage_breakpoint"
opponent = "Guzzlord"
description = "Discover all Guzzlord damage breakpoints. 496 coin flip — Sand Tomb/Rock Tomb tiers (Volt Switch is resisted) are the atk-side deciders."
source = "Simulator-derived; 1-1 sweep 2026-06-12 (PvPoke GL pool 2026-06-10)"

# Corsola (Galarian): neutral Volt Switch chip into low-atk deep bulk —
# the 507 is a chip war where one fast-move tier up locks the win.
[Forretress.Great.anchors.corsola_galarian_brkp_any]
kind = "damage_breakpoint"
opponent = "Corsola (Galarian)"
description = "Discover all G-Corsola damage breakpoints. Thinnest win (507) — a Volt Switch tier up locks the chip war."
source = "Simulator-derived; 1-1 sweep 2026-06-12 (PvPoke GL pool 2026-06-10)"

# Lickilicky: pure-neutral grind into huge bulk; Volt Switch and Sand
# Tomb tiers are the atk-side flip candidates for the 406, priced
# against the bulk they cost.
[Forretress.Great.anchors.lickilicky_brkp_any]
kind = "damage_breakpoint"
opponent = "Lickilicky"
description = "Discover all Lickilicky damage breakpoints. Close loss (406) into deep bulk — Volt Switch/Sand Tomb tiers priced against the def they trade away."
source = "Simulator-derived; 1-1 sweep 2026-06-12 (PvPoke GL pool 2026-06-10)"

# Jellicent: Volt Switch is super-effective — its damage tiers are the
# likeliest single integers deciding the 575, and they're cheap to
# reach against Jellicent's modest defense.
[Forretress.Great.anchors.jellicent_brkp_any]
kind = "damage_breakpoint"
opponent = "Jellicent"
description = "Discover all Jellicent damage breakpoints. SE Volt Switch carries the 575 — its tiers are cheap and worth locking in."
source = "Simulator-derived; 1-1 sweep 2026-06-12 (PvPoke GL pool 2026-06-10)"
