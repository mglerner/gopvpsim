# Verification counts for the pogo-simulator, extracted from
# DEVELOPER_NOTES.md so both the human-readable file and the
# Reader's-Guide token resolver can read the same scalars.
#
# Keep this in sync with DEVELOPER_NOTES.md "Current status" and
# "Verified correct" when the numbers change. build_guides.py surfaces
# each value as a `dev:<key>` token; every citation in a guide should
# point at one of these rows, never a hardcoded number in the body.md.

# Battle-correctness test suite. "102 original + 9 shadow + 9 Corviknight
# mirror" per DEVELOPER_NOTES.md line 5. A single scalar is enough for
# the reader: what matters is the total, not the breakdown.
test_count = 120

# Matchups where our simulator matches PvPoke's simulate-mode score
# table exactly (+/-0) across all nine shield scenarios. See
# DEVELOPER_NOTES.md "Current status" line 5-6.
pvpoke_matchups_verified = 8

# Per-cell count: one cell per (matchup, shield scenario). 8 * 9 = 72.
# Stated explicitly so the token resolver doesn't multiply silently and
# drift if the shield-scenario count ever changes.
pvpoke_cells_verified = 72

# Type-chart coverage: every (attacker-type, defender-type) matchup in
# PvPoke's chart validated against ours. See DEVELOPER_NOTES.md
# "Verified correct / Type effectiveness" line 11.
type_chart_cells_verified = 324

# PvPoke bugs found and documented in DEVELOPER_NOTES.md "PvPoke bugs
# found" (sections 1, 2, 3, 7 — numbering reflects discovery order).
# 4 (Mimikyu SS timing) was retracted 2026-04-15 and is excluded.
pvpoke_bugs_documented = 4
